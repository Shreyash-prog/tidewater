# Shared tooling configuration for the Tidewater backend (lambdas/ + infra/).
# Per-Lambda runtime dependencies live in each Lambda's requirements.txt; this
# file only configures the dev toolchain (Ruff, mypy, pytest).

[tool.ruff]
target-version = "py312"
line-length = 100
# First-party roots: `lambdas/` (for `shared`) and the repo root (for the `infra`
# package). Listing `infra` here would make Ruff treat the CDK `constructs`
# library as first-party (infra/constructs/ exists), mis-sorting imports.
src = ["lambdas", "."]

[tool.ruff.lint]
# E/F: pyflakes + pycodestyle, I: import sorting, B: bugbear, UP: pyupgrade,
# SIM: simplify, ANN: enforce type annotations (mirrors mypy disallow_untyped_defs).
select = ["E", "F", "I", "B", "UP", "SIM", "ANN"]
# ANN401 (no `Any`) is impractical for CDK construct **kwargs; allow it.
ignore = ["ANN401"]

[tool.mypy]
python_version = "3.12"
disallow_untyped_defs = true
warn_unused_ignores = true
warn_redundant_casts = true
# Import roots: `lambdas/` for shared Lambda code (`from shared.models import ...`)
# and the repo root for the `infra` package (`from infra.stacks... import ...`).
# infra/ is NOT a bare sys.path root — that would let infra/constructs/ shadow
# the CDK `constructs` library.
mypy_path = ["lambdas", "."]
explicit_package_bases = true
namespace_packages = true
plugins = ["pydantic.mypy"]

[tool.pytest.ini_options]
# Test sources are importable from the same roots used at runtime. infra/ is
# deliberately absent so the `infra` package (not a bare dir) is what's imported.
pythonpath = ["lambdas", "."]
testpaths = ["tests", "lambdas/tests", "infra/tests", "tools/tests"]
# Smoke tests need real AWS credentials and a deployed stack — excluded from the
# default run; `make smoke` selects them explicitly.
# importlib mode lets same-named test modules (e.g. several test_handler.py)
# coexist across the per-component test packages.
addopts = "-q -m 'not smoke' --import-mode=importlib"
markers = [
    "smoke: integration test requiring real AWS credentials and a deployed stack",
]
